document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  function enhanceRenderedSite() {
    const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const style = document.createElement('style');
    style.id = 'cct-motion-enhancements';
    style.textContent = `
      html { scroll-behavior: smooth; }
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 1;
        background:
          linear-gradient(90deg, transparent, rgba(217,119,87,.055), transparent),
          repeating-linear-gradient(90deg, transparent 0 118px, rgba(255,255,255,.018) 118px 119px);
        opacity: .55;
        mix-blend-mode: screen;
        transform: translate3d(var(--cct-drift, 0px), 0, 0);
      }
      .nav, header, .topbar {
        backdrop-filter: blur(18px) saturate(1.16);
      }
      .btn, .arch-tab, #copy, a.btn, button {
        transition:
          transform .22s cubic-bezier(.2,.8,.2,1),
          border-color .22s ease,
          background-color .22s ease,
          box-shadow .22s ease,
          color .22s ease;
      }
      .btn:hover, .arch-tab:hover, #copy:hover, a.btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 14px 42px rgba(0,0,0,.24), 0 0 0 1px rgba(217,119,87,.22);
      }
      .cat, .pillar, .metric, .arch-panel, .install, .agent-card, .skill-card, .mcp-card {
        transition:
          transform .28s cubic-bezier(.2,.8,.2,1),
          border-color .28s ease,
          box-shadow .28s ease,
          background-color .28s ease,
          opacity .6s ease;
      }
      .cat:hover, .pillar:hover, .agent-card:hover, .skill-card:hover, .mcp-card:hover {
        transform: translateY(-4px);
        border-color: rgba(217,119,87,.42) !important;
        box-shadow: 0 24px 70px rgba(0,0,0,.28);
      }
      .arch-panel {
        animation: cctPanelIn .42s cubic-bezier(.2,.8,.2,1) both;
      }
      .hero h1, .section-title {
        text-wrap: balance;
      }
      .section-sub, .right, .cat p, .pillar p, .foot p {
        text-wrap: pretty;
      }
      .install-body .ok {
        animation: cctOkPulse 2.4s ease-in-out infinite;
      }
      .layer {
        transition: transform .2s ease-out, border-color .28s ease, box-shadow .28s ease;
      }
      .layer:hover {
        border-color: rgba(217,119,87,.5) !important;
        box-shadow: 0 18px 50px rgba(0,0,0,.22);
      }
      .cct-reveal {
        opacity: 0;
        transform: translateY(22px);
        transition: opacity .7s ease, transform .7s cubic-bezier(.2,.8,.2,1);
      }
      .cct-reveal.is-visible {
        opacity: 1;
        transform: translateY(0);
      }
      .cct-spotlight {
        position: fixed;
        inset: 0;
        z-index: 2;
        pointer-events: none;
        background: radial-gradient(360px circle at var(--x, 50%) var(--y, 20%), rgba(217,119,87,.11), transparent 58%);
        opacity: .72;
        mix-blend-mode: screen;
      }
      @keyframes cctPanelIn {
        from { opacity: 0; transform: translateY(10px) scale(.985); }
        to { opacity: 1; transform: translateY(0) scale(1); }
      }
      @keyframes cctOkPulse {
        0%, 100% { filter: brightness(1); }
        50% { filter: brightness(1.38); }
      }
      @media (max-width: 760px) {
        body::after, .cct-spotlight { display: none; }
        .cct-reveal { transform: translateY(14px); }
      }
      @media (prefers-reduced-motion: reduce) {
        html { scroll-behavior: auto; }
        *, *::before, *::after {
          animation-duration: .01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: .01ms !important;
        }
        body::after, .cct-spotlight { display: none; }
        .cct-reveal { opacity: 1; transform: none; }
      }
    `;
    document.head.appendChild(style);

    const spotlight = document.createElement('div');
    spotlight.className = 'cct-spotlight';
    document.body.appendChild(spotlight);

    const revealTargets = document.querySelectorAll(
      '.hero, .section-head, .metric, .cat, .pillar, .arch-panel, .install, .foot-grid, .foot-bottom'
    );
    revealTargets.forEach(function(el, i) {
      el.classList.add('cct-reveal');
      el.style.transitionDelay = Math.min(i % 6, 5) * 45 + 'ms';
    });

    if ('IntersectionObserver' in window) {
      const io = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (!entry.isIntersecting) return;
          entry.target.classList.add('is-visible');
          io.unobserve(entry.target);
        });
      }, { threshold: .12, rootMargin: '0px 0px -8% 0px' });
      revealTargets.forEach(function(el) { io.observe(el); });
    } else {
      revealTargets.forEach(function(el) { el.classList.add('is-visible'); });
    }

    if (!reducedMotion) {
      window.addEventListener('pointermove', function(e) {
        const x = e.clientX + 'px';
        const y = e.clientY + 'px';
        spotlight.style.setProperty('--x', x);
        spotlight.style.setProperty('--y', y);
        document.body.style.setProperty('--cct-drift', ((e.clientX / window.innerWidth) - .5) * 18 + 'px');
      }, { passive: true });
    }

    document.querySelectorAll('.arch-tab').forEach(function(tab) {
      tab.addEventListener('click', function() {
        var target = document.querySelector('.arch-panel.active');
        if (target) {
          target.animate([
            { opacity: .55, transform: 'translateY(8px) scale(.99)' },
            { opacity: 1, transform: 'translateY(0) scale(1)' }
          ], { duration: 360, easing: 'cubic-bezier(.2,.8,.2,1)' });
        }
      });
    });
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
    enhanceRenderedSite();
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

1f242d;\n    --line-2:#2a313d;\n    --ink:#e6e8eb;\n    --ink-2:#a8aeb8;\n    --ink-3:#6b7280;\n    --accent:#d97757; /* Claude orange */\n    --accent-2:#f4a261;\n    --green:#7cc28b;\n    --blue:#7aa2f7;\n    --violet:#b48ead;\n    --yellow:#e0c485;\n    --red:#e07a7a;\n    --grid: 8px;\n    --mono:'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;\n    --sans:'Geist', -apple-system, system-ui, sans-serif;\n    --serif:'Instrument Serif', Georgia, serif;\n  }\n  *{box-sizing:border-box}\n  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}\n  body{\n    background:\n      radial-gradient(1200px 600px at 80% -100px, rgba(217,119,87,0.08), transparent 60%),\n      radial-gradient(900px 500px at -10% 30%, rgba(122,162,247,0.05), transparent 60%),\n      var(--bg);\n    min-height:100vh;\n    overflow-x:hidden;\n  }\n  a{color:inherit;text-decoration:none}\n  button{font-family:inherit;cursor:pointer;border:0;background:none;color:inherit}\n  ::selection{background:var(--accent);color:#0a0b0d}\n\n  /* ───── grid backdrop ───── */\n  .grid-bg{\n    position:fixed;inset:0;z-index:0;pointer-events:none;\n    background-image:\n      linear-gradient(to right, rgba(255,255,255,0.025) 1px, transparent 1px),\n      linear-gradient(to bottom, rgba(255,255,255,0.025) 1px, transparent 1px);\n    background-size:48px 48px;\n    mask-image:radial-gradient(ellipse 80% 60% at 50% 30%, #000 30%, transparent 80%);\n  }\n\n  /* ───── nav ───── */\n  .nav{\n    position:sticky;top:0;z-index:50;\n    backdrop-filter:saturate(140%) blur(14px);\n    background:rgba(10,11,13,0.72);\n    border-bottom:1px solid var(--line);\n  }\n  .nav-inner{\n    max-width:1280px;margin:0 auto;padding:14px 28px;\n    display:flex;align-items:center;gap:24px;\n  }\n  .brand{display:flex;align-items:center;gap:10px;font-family:var(--mono);font-weight:600;letter-spacing:-0.01em;font-size:13px}\n  .brand-dot{width:14px;height:14px;border-radius:3px;background:linear-gradient(135deg,var(--accent),#b85a3c);box-shadow:0 0 0 1px rgba(255,255,255,0.06), 0 4px 12px rgba(217,119,87,0.35)}\n  .brand-name{color:var(--ink)}\n  .brand-sep{color:var(--ink-3)}\n  .brand-tag{color:var(--ink-2)}\n  .nav-links{margin-left:auto;display:flex;gap:4px;align-items:center;font-family:var(--mono);font-size:12px;color:var(--ink-2)}\n  .nav-links a{padding:8px 12px;border-radius:6px;transition:color .15s, background .15s}\n  .nav-links a:hover{color:var(--ink);background:var(--panel)}\n  .nav-cta{\n    margin-left:8px;\n    display:inline-flex;align-items:center;gap:8px;\n    background:var(--ink);color:#0a0b0d;\n    padding:8px 12px;border-radius:6px;font-weight:600;font-size:12px;\n    font-family:var(--mono);\n    transition:transform .15s, background .15s;\n  }\n  .nav-cta:hover{transform:translateY(-1px);background:#fff}\n  .nav-cta svg{width:13px;height:13px}\n\n  /* ───── shell helpers ───── */\n  .wrap{max-width:1280px;margin:0 auto;padding:0 28px;position:relative;z-index:1}\n  .eyebrow{\n    font-family:var(--mono);font-size:11px;letter-spacing:0.12em;text-transform:uppercase;\n    color:var(--ink-3);\n    display:inline-flex;align-items:center;gap:8px;\n  }\n  .eyebrow::before{content:\"\";width:18px;height:1px;background:var(--ink-3)}\n\n  .section-title{\n    font-family:var(--sans);font-weight:600;letter-spacing:-0.02em;\n    font-size:clamp(28px,3.4vw,42px);line-height:1.1;\n    color:var(--ink);margin:14px 0 0;\n    text-wrap:balance;\n  }\n  .section-title em{font-family:var(--serif);font-style:italic;font-weight:400;color:var(--accent)}\n  .section-sub{\n    margin-top:14px;color:var(--ink-2);max-width:640px;font-size:16px;line-height:1.55;\n    text-wrap:pretty;\n  }\n\n  /* ───── hero ───── */\n  .hero{padding:64px 0 80px;position:relative}\n  .hero-grid{display:grid;grid-template-columns:1.15fr 1fr;gap:56px;align-items:center}\n  .hero-pill{\n    display:inline-flex;align-items:center;gap:10px;\n    padding:6px 10px 6px 6px;border-radius:99px;\n    background:var(--panel);border:1px solid var(--line);\n    font-family:var(--mono);font-size:12px;color:var(--ink-2);\n  }\n  .hero-pill .badge{\n    background:rgba(217,119,87,0.15);color:var(--accent);\n    padding:3px 8px;border-radius:99px;font-weight:600;font-size:11px;\n    border:1px solid rgba(217,119,87,0.3);\n  }\n  .hero h1{\n    font-size:clamp(44px,6.2vw,84px);line-height:0.96;letter-spacing:-0.035em;\n    margin:24px 0 0;font-weight:600;text-wrap:balance;\n  }\n  .hero h1 .em{font-family:var(--serif);font-style:italic;font-weight:400;color:var(--accent)}\n  .hero h1 .stroke{\n    -webkit-text-stroke:1px var(--ink);\n    color:transparent;\n  }\n  .hero-sub{\n    margin-top:24px;font-size:18px;line-height:1.55;color:var(--ink-2);\n    max-width:540px;text-wrap:pretty;\n  }\n  .hero-sub b{color:var(--ink);font-weight:500}\n\n  /* install command card */\n  .install{\n    margin-top:32px;\n    background:var(--bg-2);\n    border:1px solid var(--line);\n    border-radius:12px;\n    overflow:hidden;\n    box-shadow:0 30px 80px -40px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.02) inset;\n  }\n  .install-head{\n    display:flex;align-items:center;gap:8px;\n    padding:10px 14px;border-bottom:1px solid var(--line);\n    font-family:var(--mono);font-size:11px;color:var(--ink-3);\n  }\n  .lights{display:flex;gap:6px;margin-right:8px}\n  .lights span{width:10px;height:10px;border-radius:99px;display:block}\n  .lights span:nth-child(1){background:#ff5f57}\n  .lights span:nth-child(2){background:#febc2e}\n  .lights span:nth-child(3){background:#28c840}\n  .install-body{padding:18px 18px 14px;font-family:var(--mono);font-size:14px;line-height:1.7}\n  .install-body .prompt{color:var(--ink-3)}\n  .install-body .cmd{color:var(--ink)}\n  .install-body .accent{color:var(--accent)}\n  .install-body .ok{color:var(--green)}\n  .install-foot{\n    display:flex;align-items:center;justify-content:space-between;\n    padding:10px 14px;border-top:1px solid var(--line);\n    font-family:var(--mono);font-size:11px;color:var(--ink-3);\n  }\n  .copy-btn{\n    display:inline-flex;align-items:center;gap:6px;\n    padding:5px 9px;border-radius:5px;\n    background:var(--panel);border:1px solid var(--line);\n    color:var(--ink-2);font-family:var(--mono);font-size:11px;\n    transition:all .15s;\n  }\n  .copy-btn:hover{color:var(--ink);border-color:var(--line-2)}\n  .copy-btn.ok{color:var(--green);border-color:rgba(124,194,139,0.3)}\n\n  .hero-ctas{margin-top:20px;display:flex;gap:10px;flex-wrap:wrap}\n  .btn{\n    display:inline-flex;align-items:center;gap:8px;\n    padding:11px 16px;border-radius:8px;\n    font-family:var(--mono);font-size:13px;font-weight:500;\n    transition:all .15s;\n    border:1px solid transparent;\n  }\n  .btn-primary{background:var(--ink);color:#0a0b0d}\n  .btn-primary:hover{background:#fff;transform:translateY(-1px)}\n  .btn-ghost{background:var(--panel);color:var(--ink);border-color:var(--line)}\n  .btn-ghost:hover{border-color:var(--line-2);background:var(--bg-2)}\n  .btn svg{width:14px;height:14px}\n\n  .hero-meta{\n    margin-top:36px;display:flex;gap:28px;flex-wrap:wrap;\n    font-family:var(--mono);font-size:12px;color:var(--ink-3);\n  }\n  .hero-meta b{color:var(--ink-2);font-weight:500}\n\n  /* hero right: stack visualizer */\n  .stack{\n    position:relative;height:520px;\n    border:1px solid var(--line);border-radius:14px;\n    background:linear-gradient(180deg, var(--bg-2), var(--panel));\n    overflow:hidden;\n    box-shadow:0 60px 120px -40px rgba(0,0,0,0.8);\n  }\n  .stack::before{\n    content:\"\";position:absolute;inset:0;\n    background-image:\n      linear-gradient(to right, rgba(255,255,255,0.025) 1px, transparent 1px),\n      linear-gradient(to bottom, rgba(255,255,255,0.025) 1px, transparent 1px);\n    background-size:32px 32px;\n  }\n  .stack-head{\n    position:absolute;top:0;left:0;right:0;\n    padding:14px 18px;border-bottom:1px solid var(--line);\n    display:flex;align-items:center;justify-content:space-between;\n    font-family:var(--mono);font-size:11px;color:var(--ink-3);\n    background:rgba(15,17,21,0.6);backdrop-filter:blur(8px);z-index:2;\n  }\n  .stack-head .dot{width:6px;height:6px;border-radius:99px;background:var(--green);box-shadow:0 0 0 3px rgba(124,194,139,0.15)}\n  .layer{\n    position:absolute;left:50%;transform:translateX(-50%);\n    width:88%;border-radius:10px;\n    border:1px solid var(--line-2);\n    background:rgba(15,17,21,0.85);\n    backdrop-filter:blur(10px);\n    padding:14px 16px;\n    transition:transform .35s ease, box-shadow .35s ease, border-color .35s ease;\n  }\n  .layer:hover{transform:translateX(-50%) translateY(-3px) scale(1.015);border-color:var(--accent);box-shadow:0 20px 40px -10px rgba(217,119,87,0.25)}\n  .layer .row{display:flex;align-items:center;justify-content:space-between;gap:12px}\n  .layer .name{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--ink)}\n  .layer .count{font-family:var(--mono);font-size:11px;color:var(--ink-3)}\n  .layer .desc{margin-top:6px;font-size:12px;color:var(--ink-2);line-height:1.5}\n  .layer .ico{\n    width:22px;height:22px;border-radius:5px;\n    display:inline-flex;align-items:center;justify-content:center;\n    font-family:var(--mono);font-size:11px;font-weight:700;\n  }\n  .l1{top:64px}\n  .l1 .ico{background:rgba(217,119,87,0.18);color:var(--accent)}\n  .l2{top:158px}\n  .l2 .ico{background:rgba(122,162,247,0.18);color:var(--blue)}\n  .l3{top:252px}\n  .l3 .ico{background:rgba(124,194,139,0.18);color:var(--green)}\n  .l4{top:346px}\n  .l4 .ico{background:rgba(180,142,173,0.18);color:var(--violet)}\n  .l5{top:440px}\n  .l5 .ico{background:rgba(224,196,133,0.18);color:var(--yellow)}\n\n  .connector{position:absolute;left:50%;width:1px;background:linear-gradient(180deg,transparent,var(--line-2),transparent);height:calc(100% - 100px);top:64px;z-index:0}\n\n ass=\"layer l4\">\n        <div class=\"row\">\n          <div style=\"display:flex;align-items:center;gap:10px\"><span class=\"ico\">H<\u002Fspan><span class=\"name\">hooks/<\u002Fspan><\u002Fdiv>\n          <span class=\"count\">3 lifecycle<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"desc\">pre-tool-use · post-tool-use · design-quality-check<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"layer l5\">\n        <div class=\"row\">\n          <div style=\"display:flex;align-items:center;gap:10px\"><span class=\"ico\">M<\u002Fspan><span class=\"name\">memory/<\u002Fspan><\u002Fdiv>\n          <span class=\"count\">persistent<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"desc\">facts · preferences · corrections · handoffs across sessions<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<!-- ═════ STATS ═════ -->\n<section class=\"stats\">\n  <div class=\"stats-grid\">\n    <div class=\"stat\">\n      <div class=\"num\">200<sup>+<\u002Fsup><\u002Fdiv>\n      <div class=\"lbl\">Slash commands<\u002Fdiv>\n      <div class=\"desc\">Stack-agnostic skills that auto-detect language &amp; framework.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"stat\">\n      <div class=\"num\">~390<\u002Fdiv>\n      <div class=\"lbl\">Specialist agents<\u002Fdiv>\n      <div class=\"desc\">14 originals + VoltAgent, wshobson, contains-studio.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"stat\">\n      <div class=\"num\">45<sup>+<\u002Fsup><\u002Fdiv>\n      <div class=\"lbl\">MCP servers<\u002Fdiv>\n      <div class=\"desc\">Figma, Serena, Stripe, K8s, Cloudflare, Postgres &amp; more.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"stat\">\n      <div class=\"num\">14<\u002Fdiv>\n      <div class=\"lbl\">Plugins<\u002Fdiv>\n      <div class=\"desc\">superpowers · ui-ux-pro-max · ruflo · frontend-design.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"stat\">\n      <div class=\"num\">6<\u002Fdiv>\n      <div class=\"lbl\">Archetypes<\u002Fdiv>\n      <div class=\"desc\">web · saas · ai · all · custom · files-only.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ═════ ARCHETYPES ═════ -->\n<section class=\"section\" id=\"archetypes\">\n  <div class=\"wrap\">\n    <div class=\"section-head\">\n      <div>\n        <span class=\"eyebrow\">01 — One question<\u002Fspan>\n        <h2 class=\"section-title\">Six bundles. <em>One installer.<\u002Fem><\u002Fh2>\n        <p class=\"section-sub\">The installer asks one thing — <em>what are you building?<\u002Fem> — then wires up the matching plugins, skills, agents, and MCP servers. Re-run it anytime; it skips what's already there.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"right\">Pick a card. The installer handles the rest, including API-key prompts you can skip and add later.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"arch\">\n      <div class=\"arch-tabs\" role=\"tablist\">\n        <button class=\"arch-tab active\" data-tab=\"web\"><div class=\"key\">--archetype<\u002Fdiv><div class=\"label\">web<\u002Fdiv><\u002Fbutton>\n        <button class=\"arch-tab\" data-tab=\"saas\"><div class=\"key\">--archetype<\u002Fdiv><div class=\"label\">saas<\u002Fdiv><\u002Fbutton>\n        <button class=\"arch-tab\" data-tab=\"ai\"><div class=\"key\">--archetype<\u002Fdiv><div class=\"label\">ai<\u002Fdiv><\u002Fbutton>\n        <button class=\"arch-tab\" data-tab=\"all\"><div class=\"key\">--all<\u002Fdiv><div class=\"label\">all<\u002Fdiv><\u002Fbutton>\n        <button class=\"arch-tab\" data-tab=\"custom\"><div class=\"key\">--archetype<\u002Fdiv><div class=\"label\">custom<\u002Fdiv><\u002Fbutton>\n        <button class=\"arch-tab\" data-tab=\"files\"><div class=\"key\">--archetype<\u002Fdiv><div class=\"label\">files-only<\u002Fdiv><\u002Fbutton>\n      <\u002Fdiv>\n\n      <!-- web -->\n      <div class=\"arch-panel active\" data-panel=\"web\">\n        <div>\n          <h3>Premium <em>landing pages<\u002Fem>, agencies, marketing.<\u002Fh3>\n          <p>For $10K-tier sites — animated hero scenes, design-forward marketing, scroll-driven 3D, polished portfolios. Pulls in motion specialists, GSAP, three.js, and a Figma pipeline.<\u002Fp>\n          <ul class=\"arch-bullets\">\n            <li>impeccable · ui-ux-pro-max · 21st-dev/magic<\u002Fli>\n            <li>frontend-design · gsap-skills · motion-principles<\u002Fli>\n            <li>figma + playwright MCP for design-to-code<\u002Fli>\n            <li>three · @react-three/fiber · drei · postprocessing · lenis · leva<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <div class=\"arch-keys\">\n          <div class=\"arch-keys-head\"><span>What you can ship<\u002Fspan><span>10 highlights<\u002Fspan><\u002Fdiv>\n          <div class=\"arch-keys-list\">\n            <div class=\"key-item\"><span class=\"k-dot\"><\u002Fspan> /ui pricing card<\u002Fdiv>\n            <div class=\"key-item\"><span class=\"k-dot\"><\u002Fspan> /polish design<\u002Fdiv>\n            <div class=\"key-item\"><span class=\"k-dot b\"><\u002Fspan> scroll-driven 3D<\u002Fdiv>\n            <div class=\"key-item\"><span class=\"k-dot b\"><\u002Fspan> GSAP ScrollTrigger<\u002Fdiv>\n            <div class=\"key-item\"><span class=\"k-dot g\"><\u002Fspan> bloom + DOF<\u002Fdiv>\n            <div class=\"key-item\"><span class=\"k-dot g\"><\u002Fspan> WebGPU + TSL<\u002Fdiv>\n            <div class=\"key-item\"><span class=\"k-dot v\"><\u002Fspan> Figma → tokens<\u002Fdiv>\n            <div class=\"key-item\"><span class=\"k-dot v\"><\u002Fspan> Playwright QA<\u002Fdiv>\n            <div class=\"key-item\"><span class=\"k-dot y\"><\u002Fspan> /seo-scaffold<\u002Fdiv>\n            <div class=\"key-item\"><span class=\"k-dot y\"><\u002Fspan> /web-launch-check<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- saas -->\n      <div class=\"arch-panel\" data-panel=\"saas\">\n        <div>\n          <h3>Enterprise <em>SaaS<\u002Fem> &amp; B2B — built to ship.<\u002Fh3>\n          <p>For $100K-tier products — multi-tenant dashboards, billing flows, complex backends. Adds the entire <code>web<\u002Fcode> bundle plus superpowers, ruflo (testgen, security-audit, observability), gstack, claude-context, and full DB/payments/comms/monitoring MCPs.<\u002Fp>\n          <ul class=\"arch-bullets\">\n            <li>everything from <code>web<\u002Fcode><\u002Fli>\n            <li>superpowers · gstack · ruflo (testgen, audit, observability)<\u002Fli>\n            <li>claude-context — semantic RAG over your codebase<\u002Fli>\n            <li>postgres · supabase · stripe · slack · sentry · linear<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <div class=\"arch-keys\">\n          <div class=\"arch-keys-head\"><span>Daily workflow<\u002Fspan><span>cross-archetype<\u002Fspan><\u002Fdiv>\n          <div class=\"arch-keys-list\">\n            <div class=\"key-item\"><span class=\"k-dot\"><\u002Fspan> /office-hours feature<\u002Fdiv>\n            <div class=\"key-item\"><span class=\"k-dot\"><\u002Fspan> /grill-me<\u002Fdiv>\n            <div class=\"key-item\"><span class=\"k-dot b\"><\u002Fspan> /tdd module<\u002Fdiv>\n            <div class=\"key-item\"><span class=\"k-dot b\"><\u002Fspan> /review-pr<\u002Fdiv>\n            <div class=\"key-item\"><span class=\"k-dot g\"><\u002Fspan> /security-scan<\u002Fdiv>\n            <div class=\"key-item\"><span class=\"k-dot g\"><\u002Fspan> /deploy-checklist<\u002Fdiv>\n            <div class=\"key-item\"><span class=\"k-dot v\"><\u002Fspan> /db-migration<\u002Fdiv>\n            <div class=\"key-item\"><span class=\"k-dot v\"><\u002Fspan> /ci-pipeline<\u002Fdiv>\n            <div class=\"key-item\"><span class=\"k-dot y\"><\u002Fspan> /ship → /canary<\u002Fdiv>\n            <div class=\"key-item\"><span class=\"k-dot y\"><\u002Fspan> /business-blueprint<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- ai -->\n      <div class=\"arch-panel\" data-panel=\"ai\">\n        <div>\n          <h3>Autonomous <em>agents<\u002Fem>, RAG &amp; LLM apps.<\u002Fh3>\n          <p>For agentic systems and vector-search products. Boots ruflo's full orchestration set — swarm, autopilot, federation, agentdb, rag-memory, knowledge-graph — on top of qdrant, chroma, claude-context, and HF.<\u002Fp>\n          <ul class=\"arch-bullets\">\n            <li>full ruflo plugin set + superpowers<\u002Fli>\n            <li>qdrant · chroma · claude-context (RAG)<\u002Fli>\n            <li>huggingface · perplexity · firecrawl · tavily · exa<\u002Fli>\n            <li>browserbase · e2b · replicate · elevenlabs<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <div class=\"arch-keys\">\n          <div class=\"arch-keys-head\"><span>Build patterns<\u002Fspan><span>agentic<\u002Fspan><\u002Fdiv>\n          <div class=\"arch-keys-list\">\n            <div class=\"key-item\"><span class=\"k-dot\"><\u002Fspan> ruflo-swarm boot<\u002Fdiv>\n            <div class=\"key-item\"><span class=\"k-dot\"><\u002Fspan> ruflo-autopilot loop<\u002Fdiv>\n            <div class=\"key-item\"><span class=\"k-dot b\"><\u002Fspan> claude-context RAG<\u002Fdiv>\n            <div class=\"key-item\"><span class=\"k-dot b\"><\u002Fspan> qdrant search<\u002Fdiv>\n            <div class=\"key-item\"><span class=\"k-dot g\"><\u002Fspan> dispatch parallel<\u002Fdiv>\n            <div class=\"key-item\"><span class=\"k-dot g\"><\u002Fspan> sequential-thinking<\u002Fdiv>\n            <div class=\"key-item\"><span class=\"k-dot v\"><\u002Fspan> brainstorming<\u002Fdiv>\n            <div class=\"key-item\"><span class=\"k-dot v\"><\u002Fspan> tool-use TDD<\u002Fdiv>\n            <div class=\"key-item\"><span class=\"k-dot y\"><\u002Fspan> /claude-api skill<\u002Fdiv>\n            <div class=\"key-item\"><span class=\"k-dot y\"><\u002Fspan> evals + caching<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- all -->\n      <div class=\"arch-panel\" data-panel=\"all\">\n        <div>\n          <h3>Solo founders. The <em>kitchen sink.<\u002Fem><\u002Fh3>\n          <p>The union of <code>web<\u002Fcode> + <code>saas<\u002Fcode> + <code>ai<\u002Fcode>. Every plugin, every MCP, every agent collection. If you're a one-person team shipping across surfaces — landing page on Monday, dashboard on Tuesday, agent on Wednesday — pick this.<\u002Fp>\n          <ul class=\"arch-bullets\">\n            <li>everything in this toolkit, on day one<\u002Fli>\n            <li>~390 agents across 12 source collections<\u002Fli>\n            <li>45+ MCP servers across 18 categories<\u002Fli>\n            <li>still skip the API-key prompts you don't need<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <div class=\"arch-keys\">\n          <div class=\"arch-keys-head\"><span>Stack-agnostic<\u002Fspan><span>auto-detect<\u002Fspan><\u002Fdiv>\n          <div class=\"arch-keys-list\">\n            <div class=\"key-item\"><span class=\"k-dot\"><\u002Fspan> Jest · pytest · go test<\u002Fdiv>\n            <div class=\"key-item\"><span class=\"k-dot\"><\u002Fspan> Next · Astro · Vite<\u002Fdiv>\n            <div class=\"key-item\"><span class=\"k-dot b\"><\u002Fspan> FastAPI · Express<\u002Fdiv>\n            <div class=\"key-item\"><span class=\"k-dot b\"><\u002Fspan> Postgres · Supabase<\u002Fdiv>\n            <div class=\"key-item\"><span class=\"k-dot g\"><\u002Fspan> GitHub Actions · GitLab<\u002Fdiv>\n            <div class=\"key-item\"><span class=\"k-dot g\"><\u002Fspan> Docker · K8s · Helm<\u002Fdiv>\n            <div class=\"key-item\"><span class=\"k-dot v\"><\u002Fspan> Stripe · Twilio<\u002Fdiv>\n            <div class=\"key-item\"><span class=\"k-dot v\"><\u002Fspan> Sentry · Datadog<\u002Fdiv>\n            <div class=\"key-item\"><span class=\"k-dot y\"><\u002Fspan> Cloudflare · Vercel<\u002Fdiv>\n            <div class=\"key-item\"><span class=\"k-dot y\"><\u002Fspan> Figma · Playwright<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- custom -->\n      <div class=\"arch-panel\" data-panel=\"custom\">\n        <div>\n          <h3>Power users. <em>Granular<\u002Fem> control.<\u002Fh3>\n          <p>Per-service prompts. The installer walks every plugin, every MCP server, asks if you want it. Skip what you don't, set keys for what you do. Best when you've already used the toolkit and know what you actually reach for.<\u002Fp>\n          <ul class=\"arch-bullets\">\n            <li>per-plugin yes / no<\u002Fli>\n            <li>per-MCP yes / no + key prompts<\u002Fli>\n            <li>per-agent-collection yes / no<\u002Fli>\n            <li>everything still gitignored where it should be<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <div class=\"arch-keys\">\n          <div class=\"arch-keys-head\"><span>Still get<\u002Fspan><span>baseline<\u002Fspan><\u002Fdiv>\n          <div class=\"arch-keys-list\">\n            <div class=\"key-item\"><span class=\"k-dot\"><\u002Fspan> 30 baseline skills<\u002Fdiv>\n            <div class=\"key-item\"><span class=\"k-dot\"><\u002Fspan> 14 original agents<\u002Fdiv>\n            <div class=\"key-item\"><span class=\"k-dot b\"><\u002Fspan> 14 auto-loading rules<\u002Fdiv>\n            <div class=\"key-item\"><span class=\"k-dot b\"><\u002Fspan> 3 lifecycle hooks<\u002Fdiv>\n            <div class=\"key-item\"><span class=\"k-dot g\"><\u002Fspan> persistent memory<\u002Fdiv>\n            <div class=\"key-item\"><span class=\"k-dot g\"><\u002Fspan> .mcp.json scaffold<\u002Fdiv>\n            <div class=\"key-item\"><span class=\"k-dot v\"><\u002Fspan> CLAUDE.md template<\u002Fdiv>\n            <div class=\"key-item\"><span class=\"k-dot v\"><\u002Fspan> settings.json deny-list<\u002Fdiv>\n            <div class=\"key-item\"><span class=\"k-dot y\"><\u002Fspan> docs/LICENSES.md<\u002Fdiv>\n            <div class=\"key-item\"><span class=\"k-dot y\"><\u002Fspan> idempotent re-run<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- files -->\n      <div class=\"arch-panel\" data-panel=\"files\">\n        <div>\n          <h3>Skeptics &amp; <em>offline.<\u002Fem> Just the files.<\u002Fh3>\n          <p>No archetypes. No prompts. No plugins. No third-party clones. Drops just the toolkit's own skills, agents, rules, hooks, and the MCP scaffold — all MIT, all in your repo, all auditable. Perfect for a first read.<\u002Fp>\n          <ul class=\"arch-bullets\">\n            <li>30 baseline skills + 14 original agents<\u002Fli>\n            <li>14 auto-loading rules + 3 hooks<\u002Fli>\n            <li>everything is text, everything is yours<\u002Fli>\n            <li>upgrade to a richer archetype anytime<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <div class=\"arch-keys\">\n          <div class=\"arch-keys-head\"><span>Footprint<\u002Fspan><span>files-only<\u002Fspan><\u002Fdiv>\n          <div class=\"arch-keys-list\">\n            <div class=\"key-item\"><span class=\"k-dot\"><\u002Fspan> .claude/skills/<\u002Fdiv>\n            <div class=\"key-item\"><span class=\"k-dot\"><\u002Fspan> .claude/agents/<\u002Fdiv>\n            <div class=\"key-item\"><span class=\"k-dot b\"><\u002Fspan> .claude/rules/<\u002Fdiv>\n            <div class=\"key-item\"><span class=\"k-dot b\"><\u002Fspan> .claude/hooks/<\u002Fdiv>\n            <div class=\"key-item\"><span class=\"k-dot g\"><\u002Fspan> .claude/memory/<\u002Fdiv>\n            <div class=\"key-item\"><span class=\"k-dot g\"><\u002Fspan> .claude/settings.json<\u002Fdiv>\n            <div class=\"key-item\"><span class=\"k-dot v\"><\u002Fspan> .mcp.json (no keys)<\u002Fdiv>\n            <div class=\"key-item\"><span class=\"k-dot v\"><\u002Fspan> CLAUDE.md (project)<\u002Fdiv>\n            <div class=\"key-item\"><span class=\"k-dot y\"><\u002Fspan> README · CATALOG<\u002Fdiv>\n            <div class=\"key-item\"><span class=\"k-dot y\"><\u002Fspan> docs/LICENSES.md<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ═════ SKILLS ═════ -->\n<section class=\"section\" id=\"skills\" style=\"padding-top:0\">\n  <div class=\"wrap\">\n    <div class=\"section-head\">\n      <div>\n        <span class=\"eyebrow\">02 — Slash commands<\u002Fspan>\n        <h2 class=\"section-title\">30 baseline skills. <em>200+ on demand.<\u002Fem><\u002Fh2>\n        <p class=\"section-sub\">Every skill auto-detects your project's language, framework, and tools. The same <code>/write-tests<\u002Fcode> emits Jest for React and pytest for FastAPI.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"right\">Skills live in <code>.claude/skills/<\u002Fcode>. Override any one at the project level by dropping a <code>SKILL.md<\u002Fcode> with the same name.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"cat-grid\">\n      <div class=\"cat\">\n        <div class=\"cat-head\">\n          <div>\n            <h4>Code quality &amp; review<\u002Fh4>\n            <div class=\"meta\">3 skills · severity-graded<\u002Fdiv>\n          <\u002Fdiv>\n          <span class=\"badge badge-orange\">core<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"cat-body\">\n          <div class=\"cat-row\"><span class=\"cmd\">/review-pr<\u002Fspan><span class=\"desc\">correctness, security, perf, conventions · GO/NO-GO<\u002Fspan><\u002Fdiv>\n          <div class=\"cat-row\"><span class=\"cmd\">/refactor<\u002Fspan><span class=\"desc\">smells → safe plan → execute with test verification<\u002Fspan><\u002Fdiv>\n          <div class=\"cat-row\"><span class=\"cmd\">/explain-code<\u002Fspan><span class=\"desc\">summary → walkthrough → ASCII data flow<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"cat-foot\">→ pairs with the <code>code-reviewer<\u002Fcode> agent<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"cat\">\n        <div class=\"cat-head\">\n class=\"cat-row\"><span class=\"cmd\">/reference-app &lt;path&gt;<\u002Fspan><span class=\"desc\">analyze a built app, store its conventions<\u002Fspan><\u002Fdiv>\n          <div class=\"cat-row\"><span class=\"cmd\">/handoff<\u002Fspan><span class=\"desc\">end-of-session summary · next session resumes cleanly<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"cat-foot\">→ rule <code>memory-discipline<\u002Fcode> reads index every session<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"cat\">\n        <div class=\"cat-head\">\n          <div>\n            <h4>Business logic<\u002Fh4>\n            <div class=\"meta\">3 skills · SaaS · ERP · fintech<\u002Fdiv>\n          <\u002Fdiv>\n          <span class=\"badge badge-violet\">domain<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"cat-body\">\n          <div class=\"cat-row\"><span class=\"cmd\">/business-blueprint<\u002Fspan><span class=\"desc\">auth, billing, multi-tenancy, GL, audit, compliance<\u002Fspan><\u002Fdiv>\n          <div class=\"cat-row\"><span class=\"cmd\">/business-logic-audit<\u002Fspan><span class=\"desc\">invariants, races, idempotency, currency precision<\u002Fspan><\u002Fdiv>\n          <div class=\"cat-row\"><span class=\"cmd\">/competitive-analysis<\u002Fspan><span class=\"desc\">Stripe · Linear · NetSuite · Shopify · cited<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"cat-foot\">→ pairs with the <code>business-architect<\u002Fcode> agent<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"cat\">\n        <div class=\"cat-head\">\n          <div>\n            <h4>UX &amp; design<\u002Fh4>\n            <div class=\"meta\">4 skills · refuses dark patterns<\u002Fdiv>\n          <\u002Fdiv>\n          <span class=\"badge badge-green\">design<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"cat-body\">\n          <div class=\"cat-row\"><span class=\"cmd\">/design-flow<\u002Fspan><span class=\"desc\">end-to-end flow before pixels · engineering-ready spec<\u002Fspan><\u002Fdiv>\n          <div class=\"cat-row\"><span class=\"cmd\">/wireframe<\u002Fspan><span class=\"desc\">pixel-free · ASCII / Mermaid · all states<\u002Fspan><\u002Fdiv>\n          <div class=\"cat-row\"><span class=\"cmd\">/microcopy<\u002Fspan><span class=\"desc\">voice-consistent · no \"Submit\" or \"Oops!\"<\u002Fspan><\u002Fdiv>\n          <div class=\"cat-row\"><span class=\"cmd\">/a11y-audit<\u002Fspan><span class=\"desc\">WCAG 2.1 AA · code fix per finding<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"cat-foot\">→ pairs with the <code>ux-designer<\u002Fcode> &amp; <code>design-system-architect<\u002Fcode> agents<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ═════ AGENTS ═════ -->\n<section class=\"section\" id=\"agents\" style=\"padding-top:0\">\n  <div class=\"wrap\">\n    <div class=\"section-head\">\n      <div>\n        <span class=\"eyebrow\">03 — Specialist personas<\u002Fspan>\n        <h2 class=\"section-title\">14 agents <em>written from scratch.<\u002Fem><\u002Fh2>\n        <p class=\"section-sub\">Original IP, MIT-licensed, deeper than skills — they hold a focused role through the whole task. Plus ~376 vendored from VoltAgent, wshobson, and contains-studio (gitignored, attribution per folder).<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"right\">Invoke with <code>/agents<\u002Fcode> or let Claude auto-delegate. They live in <code>.claude/agents/<\u002Fcode>.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"agents\">\n      <div class=\"agent\"><div class=\"agent-name\">architect<\u002Fdiv><div class=\"agent-spec\">system design · ADRs<\u002Fdiv><div class=\"agent-when\">For structural choices that are expensive to reverse — C4 diagrams, reversibility analysis.<\u002Fdiv><\u002Fdiv>\n      <div class=\"agent\"><div class=\"agent-name\">code-reviewer<\u002Fdiv><div class=\"agent-spec\">severity-graded<\u002Fdiv><div class=\"agent-when\">PR review &amp; pre-merge audit. Outputs GO / CONDITIONAL / NO-GO verdict.<\u002Fdiv><\u002Fdiv>\n      <div class=\"agent\"><div class=\"agent-name\">tdd<\u002Fdiv><div class=\"agent-spec\">red-green-refactor<\u002Fdiv><div class=\"agent-when\">Building features that need correctness. Cycle-by-cycle output, never code before tests.<\u002Fdiv><\u002Fdiv>\n      <div class=\"agent\"><div class=\"agent-name\">security-auditor<\u002Fdiv><div class=\"agent-spec\">STRIDE · OWASP<\u002Fdiv><div class=\"agent-when\">Pre-deploy auth/payment/PII review. CWE-mapped findings.<\u002Fdiv><\u002Fdiv>\n      <div class=\"agent\"><div class=\"agent-name\">devops<\u002Fdiv><div class=\"agent-spec\">DORA-aligned<\u002Fdiv><div class=\"agent-when\">Pipelines, IaC, K8s, deploy strategies, rollback plans.<\u002Fdiv><\u002Fdiv>\n      <div class=\"agent\"><div class=\"agent-name\">performance<\u002Fdiv><div class=\"agent-spec\">profile-first<\u002Fdiv><div class=\"agent-when\">Bottleneck hunt &amp; regression diagnosis. Head-of-distribution focus, before/after measurement.<\u002Fdiv><\u002Fdiv>\n      <div class=\"agent\"><div class=\"agent-name\">documentation<\u002Fdiv><div class=\"agent-spec\">reader-targeted<\u002Fdiv><div class=\"agent-when\">READMEs, API docs, runbooks, ADRs. Deletes more often than writes.<\u002Fdiv><\u002Fdiv>\n      <div class=\"agent\"><div class=\"agent-name\">mentor<\u002Fdiv><div class=\"agent-spec\">layered teaching<\u002Fdiv><div class=\"agent-when\">Concept questions, tradeoff explanations. Calibrated to your level.<\u002Fdiv><\u002Fdiv>\n      <div class=\"agent\"><div class=\"agent-name\">three-d-specialist<\u002Fdiv><div class=\"agent-spec\">r3f · WebGPU · TSL<\u002Fdiv><div class=\"agent-when\">Premium scroll-driven 3D, WebGL fallback, post-processing pipelines.<\u002Fdiv><\u002Fdiv>\n      <div class=\"agent\"><div class=\"agent-name\">ai-engineer<\u002Fdiv><div class=\"agent-spec\">LLM apps · RAG<\u002Fdiv><div class=\"agent-when\">Any feature that calls an LLM. Caching, evals, cost tuning, agentic systems.<\u002Fdiv><\u002Fdiv>\n      <div class=\"agent\"><div class=\"agent-name\">design-system-architect<\u002Fdiv><div class=\"agent-spec\">tokens · APIs<\u002Fdiv><div class=\"agent-when\">Building or auditing a design system. Theming + a11y at the component layer.<\u002Fdiv><\u002Fdiv>\n      <div class=\"agent\"><div class=\"agent-name\">qa-lead<\u002Fdiv><div class=\"agent-spec\">test pyramid<\u002Fdiv><div class=\"agent-when\">E2E, visual regression, perf budgets, flake hunting, CI gates, release smoke.<\u002Fdiv><\u002Fdiv>\n      <div class=\"agent\"><div class=\"agent-name\">business-architect<\u002Fdiv><div class=\"agent-spec\">SaaS · fintech<\u002Fdiv><div class=\"agent-when\">Money, multi-tenancy, state machines, audit, billing, refunds, RBAC. Thinks in invariants.<\u002Fdiv><\u002Fdiv>\n      <div class=\"agent\"><div class=\"agent-name\">ux-designer<\u002Fdiv><div class=\"agent-spec\">flows · IA · microcopy<\u002Fdiv><div class=\"agent-when\">Owns the user's path through the product. Refuses dark patterns.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ═════ MCP ═════ -->\n<section class=\"section\" id=\"mcp\" style=\"padding-top:0\">\n  <div class=\"wrap\">\n    <div class=\"section-head\">\n      <div>\n        <span class=\"eyebrow\">04 — Model Context Protocol<\u002Fspan>\n        <h2 class=\"section-title\">45+ servers, <em>wired up.<\u002Fem><\u002Fh2>\n        <p class=\"section-sub\">Pre-configured in <code>.mcp.json<\u002Fcode> with <code>${ENV}<\u002Fcode> placeholders — no secrets committed. Set vars in your shell or <code>.env.local<\u002Fcode>; servers resolve at runtime.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"right\">\"<span style=\"color:var(--green)\">none<\u002Fspan>\" = zero-config · \"<span style=\"color:var(--ink-2)\">key<\u002Fspan>\" = needs an env var the installer can prompt for.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"mcp-cats\">\n      <div class=\"mcp-cat\">\n        <div class=\"mcp-cat-head\"><h5>Core<\u002Fh5><span class=\"ct\">5 · zero config<\u002Fspan><\u002Fdiv>\n        <div class=\"mcp-cat-list\">\n          <div class=\"mcp-item\"><span class=\"nm\">fetch<\u002Fspan> HTTP requests <span class=\"auth no\">none<\u002Fspan><\u002Fdiv>\n          <div class=\"mcp-item\"><span class=\"nm\">filesystem<\u002Fspan> scoped file access <span class=\"auth no\">none<\u002Fspan><\u002Fdiv>\n          <div class=\"mcp-item\"><span class=\"nm\">memory<\u002Fspan> persistent KB <span class=\"auth no\">none<\u002Fspan><\u002Fdiv>\n          <div class=\"mcp-item\"><span class=\"nm\">sequential-thinking<\u002Fspan> structured reasoning <span class=\"auth no\">none<\u002Fspan><\u002Fdiv>\n          <div class=\"mcp-item\"><span class=\"nm\">context7<\u002Fspan> live library docs <span class=\"auth no\">none<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"mcp-cat\">\n        <div class=\"mcp-cat-head\"><h5>Browser &amp; scrape<\u002Fh5><span class=\"ct\">3<\u002Fspan><\u002Fdiv>\n        <div class=\"mcp-cat-list\">\n          <div class=\"mcp-item\"><span class=\"nm\">playwright<\u002Fspan> full automation <span class=\"auth no\">none<\u002Fspan><\u002Fdiv>\n          <div class=\"mcp-item\"><span class=\"nm\">puppeteer<\u002Fspan> headless Chrome <span class=\"auth no\">none<\u002Fspan><\u002Fdiv>\n          <div class=\"mcp-item\"><span class=\"nm\">firecrawl<\u002Fspan> scrape · crawl <span class=\"auth\">key<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"mcp-cat\">\n        <div class=\"mcp-cat-head\"><h5>Search &amp; research<\u002Fh5><span class=\"ct\">4<\u002Fspan><\u002Fdiv>\n        <div class=\"mcp-cat-list\">\n          <div class=\"mcp-item\"><span class=\"nm\">brave-search<\u002Fspan> web search <span class=\"auth\">key<\u002Fspan><\u002Fdiv>\n          <div class=\"mcp-item\"><span class=\"nm\">perplexity<\u002Fspan> AI research, citations <span class=\"auth\">key<\u002Fspan><\u002Fdiv>\n          <div class=\"mcp-item\"><span class=\"nm\">tavily<\u002Fspan> AI-native (1K free) <span class=\"auth\">key<\u002Fspan><\u002Fdiv>\n          <div class=\"mcp-item\"><span class=\"nm\">exa<\u002Fspan> semantic search <span class=\"auth\">key<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"mcp-cat\">\n        <div class=\"mcp-cat-head\"><h5>Databases<\u002Fh5><span class=\"ct\">5<\u002Fspan><\u002Fdiv>\n        <div class=\"mcp-cat-list\">\n          <div class=\"mcp-item\"><span class=\"nm\">postgres<\u002Fspan> SQL ops <span class=\"auth\">key<\u002Fspan><\u002Fdiv>\n          <div class=\"mcp-item\"><span class=\"nm\">sqlite<\u002Fspan> local DB <span class=\"auth no\">none<\u002Fspan><\u002Fdiv>\n          <div class=\"mcp-item\"><span class=\"nm\">redis<\u002Fspan> cache &amp; KV <span class=\"auth\">key<\u002Fspan><\u002Fdiv>\n          <div class=\"mcp-item\"><span class=\"nm\">mongodb<\u002Fspan> queries · Atlas <span class=\"auth\">key<\u002Fspan><\u002Fdiv>\n          <div class=\"mcp-item\"><span class=\"nm\">supabase<\u002Fspan> PG · auth · edge <span class=\"auth\">key<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"mcp-cat\">\n        <div class=\"mcp-cat-head\"><h5>Vector / RAG<\u002Fh5><span class=\"ct\">3<\u002Fspan><\u002Fdiv>\n        <div class=\"mcp-cat-list\">\n          <div class=\"mcp-item\"><span class=\"nm\">claude-context<\u002Fspan> codebase RAG <span class=\"auth\">key<\u002Fspan><\u002Fdiv>\n          <div class=\"mcp-item\"><span class=\"nm\">qdrant<\u002Fspan> agent memory <span class=\"auth\">key<\u002Fspan><\u002Fdiv>\n          <div class=\"mcp-item\"><span class=\"nm\">chroma<\u002Fspan> embeddings <span class=\"auth no\">none<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"mcp-cat\">\n        <div class=\"mcp-cat-head\"><h5>Infra &amp; deploy<\u002Fh5><span class=\"ct\">5<\u002Fspan><\u002Fdiv>\n        <div class=\"mcp-cat-list\">\n          <div class=\"mcp-item\"><span class=\"nm\">kubernetes<\u002Fspan> clusters · Helm <span class=\"auth\">cfg<\u002Fspan><\u002Fdiv>\n          <div class=\"mcp-item\"><span class=\"nm\">cloudflare<\u002Fspan> DNS · Workers · R2 <span class=\"auth\">key<\u002Fspan><\u002Fdiv>\n          <div class=\"mcp-item\"><span class=\"nm\">vercel<\u002Fspan> deploys · env <span class=\"auth\">key<\u002Fspan><\u002Fdiv>\n          <div class=\"mcp-item\"><span class=\"nm\">netlify<\u002Fspan> deploys · functions <span class=\"auth\">key<\u002Fspan><\u002Fdiv>\n          <div class=\"mcp-item\"><span class=\"nm\">aws<\u002Fspan> official MCP <span class=\"auth\">key<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"mcp-cat\">\n        <div class=\"mcp-cat-head\"><h5>Code &amp; design<\u002Fh5><span class=\"ct\">3<\u002Fspan><\u002Fdiv>\n        <div class=\"mcp-cat-list\">\n          <div class=\"mcp-item\"><span class=\"nm\">serena<\u002Fspan> semantic edits <span class=\"auth\">uvx<\u002Fspan><\u002Fdiv>\n          <div class=\"mcp-item\"><span class=\"nm\">figma<\u002Fspan> tokens · components <span class=\"auth\">key<\u002Fspan><\u002Fdiv>\n          <div class=\"mcp-item\"><span class=\"nm\">magic<\u002Fspan> 21st.dev <code>/ui<\u002Fcode> <span class=\"auth\">key<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"mcp-cat\">\n        <div class=\"mcp-cat-head\"><h5>Comms &amp; PM<\u002Fh5><span class=\"ct\">5<\u002Fspan><\u002Fdiv>\n        <div class=\"mcp-cat-list\">\n          <div class=\"mcp-item\"><span class=\"nm\">github<\u002Fspan> PRs · issues <span class=\"auth\">key<\u002Fspan><\u002Fdiv>\n          <div class=\"mcp-item\"><span class=\"nm\">gitlab<\u002Fspan> MRs · CI <span class=\"auth\">key<\u002Fspan><\u002Fdiv>\n          <div class=\"mcp-item\"><span class=\"nm\">slack<\u002Fspan> messaging <span class=\"auth\">key<\u002Fspan><\u002Fdiv>\n          <div class=\"mcp-item\"><span class=\"nm\">notion<\u002Fspan> docs &amp; KB <span class=\"auth\">key<\u002Fspan><\u002Fdiv>\n          <div class=\"mcp-item\"><span class=\"nm\">linear<\u002Fspan> issues · sprints <span class=\"auth\">key<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"mcp-cat\">\n        <div class=\"mcp-cat-head\"><h5>AI &amp; observability<\u002Fh5><span class=\"ct\">8+<\u002Fspan><\u002Fdiv>\n        <div class=\"mcp-cat-list\">\n          <div class=\"mcp-item\"><span class=\"nm\">huggingface<\u002Fspan> models · datasets <span class=\"auth\">key<\u002Fspan><\u002Fdiv>\n          <div class=\"mcp-item\"><span class=\"nm\">replicate<\u002Fspan> open AI models <span class=\"auth\">key<\u002Fspan><\u002Fdiv>\n          <div class=\"mcp-item\"><span class=\"nm\">elevenlabs<\u002Fspan> TTS · voices <span class=\"auth\">key<\u002Fspan><\u002Fdiv>\n          <div class=\"mcp-item\"><span class=\"nm\">e2b<\u002Fspan> AI code sandbox <span class=\"auth\">key<\u002Fspan><\u002Fdiv>\n          <div class=\"mcp-item\"><span class=\"nm\">stripe<\u002Fspan> payments <span class=\"auth\">key<\u002Fspan><\u002Fdiv>\n          <div class=\"mcp-item\"><span class=\"nm\">sentry<\u002Fspan> errors · crashes <span class=\"auth\">key<\u002Fspan><\u002Fdiv>\n          <div class=\"mcp-item\"><span class=\"nm\">grafana<\u002Fspan> dashboards · alerts <span class=\"auth\">key<\u002Fspan><\u002Fdiv>\n          <div class=\"mcp-item\"><span class=\"nm\">datadog<\u002Fspan> metrics · traces <span class=\"auth\">key<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ═════ RULES & HOOKS ═════ -->\n<section class=\"section\" id=\"rules\" style=\"padding-top:0\">\n  <div class=\"wrap\">\n    <div class=\"section-head\">\n      <div>\n        <span class=\"eyebrow\">05 — Always-on guardrails<\u002Fspan>\n        <h2 class=\"section-title\">Rules that <em>auto-load<\u002Fem>. Hooks that block.<\u002Fh2>\n        <p class=\"section-sub\">Fourteen modular rule files load into every Claude Code session — no manual invocation. Three lifecycle hooks gate dangerous operations before they run, and nudge on UI files after writes.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"right\">Project rules in <code>.claude/rules/<\u002Fcode> compose with shared rules. Add <code>my-project-rules.md<\u002Fcode> and it auto-loads alongside.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"pillars\">\n      <div class=\"pillar\">\n        <div class=\"pillar-num\">i.<\u002Fdiv>\n        <h5>Anti-hallucination<\u002Fh5>\n        <p>Verify before claiming. Ask before deciding on anything destructive, visible to others, ambiguous, costly, or locking. No silent calls.<\u002Fp>\n        <ul>\n          <li>no-hallucination.md<\u002Fli>\n          <li>memory-discipline.md<\u002Fli>\n          <li>read .claude/memory/MEMORY.md at session start<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"pillar\">\n        <div class=\"pillar-num\">ii.<\u002Fdiv>\n        <h5>Business-grade logic<\u002Fh5>\n        <p>Cents-as-int for money. UTC + DST-aware time. Append-only ledger &amp; audit. Explicit state-machine transitions. Multi-tenant isolation. Idempotency on every state change.<\u002Fp>\n        <ul>\n          <li>business-logic.md<\u002Fli>\n          <li>api-design.md · database.md<\u002Fli>\n          <li>error-handling.md (retry · circuit breaker)<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"pillar\">\n        <div class=\"pillar-num\">iii.<\u002Fdiv>\n        <h5>Design quality<\u002Fh5>\n        <p>Four pillars — hierarchy, consistency, feedback, accessibility. 4-pt spacing scale, modular type scale, WCAG AA contrast, semantic HTML, focus visibility. Refuses dark patterns.<\u002Fp>\n        <ul>\n          <li>design-quality.md · web-compliance.md<\u002Fli>\n          <li>hook: design-quality-check.sh on UI writes<\u002Fli>\n          <li>flags raw hex, missing alt, &lt;div onClick&gt;<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"margin-top:32px;display:grid;grid-template-columns:1fr 1fr;gap:18px\">\n      <div class=\"cat\">\n        <div class=\"cat-head\">\n          <div><h4>pre-tool-use.sh<\u002Fh4><div class=\"meta\">safety gate · blocks before execute<\u002Fdiv><\u002Fdiv>\n          <span class=\"badge badge-orange\">hook<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"cat-body\">\n          <div class=\"cat-row\"><span class=\"cmd\">rm -rf / · ~<\u002Fspan><span class=\"desc\">prevents system destruction<\u002Fspan><\u002Fdiv>\n          <div class=\"cat-row\"><span class=\"cmd\">curl … | bash<\u002Fspan><span class=\"desc\">blocks remote code execution<\u002Fspan><\u002Fdiv>\n          <div class=\"cat-row\"><span class=\"cmd\">git push --force<\u002Fspan><span class=\"desc\">requires explicit approval<\u002Fspan><\u002Fdiv>\n          <div class=\"cat-row\"><span class=\"cmd\">sudo …<\u002Fspan><span class=\"desc\">prevents privilege escalation<\u002Fspan><\u002Fdiv>\n          <div class=\"cat-row\"><span class=\"cmd\">writes to .env*<\u002Fspan><span class=\"desc\">protects secret files<\u002Fspan><\u002Fdiv>\n          <div class=\"cat-row\"><span class=\"cmd\">writes to .git/ · lockfiles<\u002Fspan><span class=\"desc\">leaves package managers in charge<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"cat\">\n        <div class=\"cat-head\">\n          <div><h4>design-quality-check.sh<\u002Fh4><div class=\"meta\">post-write nudge on UI files<\u002Fdiv><\u002Fdiv>\n          <span class=\"badge badge-green\">hook<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"cat-body\">\n          <div class=\"cat-row\"><span class=\"cmd\">.tsx · .jsx · .vue<\u002Fspan><span class=\"desc\">flags raw hex colors not in tokens<\u002Fspan><\u002Fdiv>\n          <div class=\"cat-row\"><span class=\"cmd\">.svelte · .astro · .html<\u002Fspan><span class=\"desc\">off-scale pixel values (not on 4-pt)<\u002Fspan><\u002Fdiv>\n          <div class=\"cat-row\"><span class=\"cmd\">&lt;img&gt; without alt<\u002Fspan><span class=\"desc\">accessibility regression caught<\u002Fspan><\u002Fdiv>\n          <div class=\"cat-row\"><span class=\"cmd\">empty &lt;button&gt;<\u002Fspan><span class=\"desc\">no aria-label, no children<\u002Fspan><\u002Fdiv>\n          <div class=\"cat-row\"><span class=\"cmd\">outline:none<\u002Fspan><span class=\"desc\">without :focus-visible replacement<\u002Fspan><\u002Fdiv>\n          <div class=\"cat-row\"><span class=\"cmd\">&lt;div onClick&gt;<\u002Fspan><span class=\"desc\">non-semantic click target<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ═════ INSTALL FULL ═════ -->\n<section class=\"section\" id=\"install\" style=\"padding-top:0\">\n  <div class=\"wrap\">\n    <div class=\"section-head\">\n      <div>\n        <span class=\"eyebrow\">06 — Quick start<\u002Fspan>\n        <h2 class=\"section-title\">One command. <em>Eight things happen.<\u002Fem><\u002Fh2>\n        <p class=\"section-sub\">Run it from any project. The installer detects your toolchain, asks one question, and lays everything down. Re-running is safe — already-installed items are skipped.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"right\">Requires Node ≥18. Works on macOS, Linux, Windows (PowerShell or Git Bash).<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:flex-start\">\n      <div class=\"install\" style=\"margin-top:0\">\n        <div class=\"install-head\">\n          <span class=\"lights\"><span><\u002Fspan><span><\u002Fspan><span><\u002Fspan><\u002Fspan>\n          install.mjs — Node 18+\n        <\u002Fdiv>\n        <div class=\"install-body\" style=\"font-size:13px\">\n          <div><span class=\"prompt\">$<\u002Fspan> <span class=\"cmd\">cd your-project<\u002Fspan><\u002Fdiv>\n          <div><span class=\"prompt\">$<\u002Fspan> <span class=\"cmd\">npx <span class=\"accent\">github:viknesh20-20/claude-code-tool-kit<\u002Fspan><\u002Fspan><\u002Fdiv>\n          <div style=\"height:8px\"><\u002Fdiv>\n          <div><span class=\"ok\">✔<\u002Fspan> <span style=\"color:var(--ink-2)\">detected:  Node 20.11 · git · npx · uvx<\u002Fspan><\u002Fdiv>\n          <div><span class=\"ok\">✔<\u002Fspan> <span style=\"color:var(--ink-2)\">missing:   Claude Code  → <span style=\"color:var(--blue);text-decoration:underline\">install link<\u002Fspan><\u002Fspan><\u002Fdiv>\n          <div style=\"height:8px\"><\u002Fdiv>\n          <div style=\"color:var(--ink-2)\">? what are you building? <span style=\"color:var(--accent)\">›<\u002Fspan> <span class=\"cmd\" style=\"color:var(--ink)\">web<\u002Fspan><\u002Fdiv>\n          <div><span class=\"ok\">✔<\u002Fspan> <span style=\"color:var(--ink-2)\">copied 30 skills · 14 agents · 14 rules · 3 hooks<\u002Fspan><\u002Fdiv>\n          <div><span class=\"ok\">✔<\u002Fspan> <span style=\"color:var(--ink-2)\">added 6 marketplaces · installed 4 plugins<\u002Fspan><\u002Fdiv>\n          <div><span class=\"ok\">✔<\u002Fspan> <span style=\"color:var(--ink-2)\">cloned VoltAgent · wshobson  →  gitignored<\u002Fspan><\u002Fdiv>\n          <div><span class=\"ok\">✔<\u002Fspan> <span style=\"color:var(--ink-2)\">added 12 MCP servers · prompted for 3 keys (skipped 2)<\u002Fspan><\u002Fdiv>\n          <div><span class=\"ok\">✔<\u002Fspan> <span style=\"color:var(--ink-2)\">initialized .claude/memory/<\u002Fspan><\u002Fdiv>\n          <div><span class=\"ok\">✔<\u002Fspan> <span style=\"color:var(--ink-2)\">generated docs/LICENSES.md<\u002Fspan><\u002Fdiv>\n          <div style=\"height:8px\"><\u002Fdiv>\n          <div style=\"color:var(--accent)\">→ next: customize CLAUDE.md, then open CHEATSHEET.md<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;flex-direction:column;gap:14px\">\n        <div class=\"cat\">\n          <div class=\"cat-head\">\n            <div><h4>Alternatives<\u002Fh4><div class=\"meta\">other install paths<\u002Fdiv><\u002Fdiv>\n            <span class=\"badge badge-blue\">paths<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"cat-body\" style=\"padding-bottom:18px\">\n            <div style=\"font-family:var(--mono);font-size:12px;color:var(--ink-3);margin-top:6px\">install everything, no menu<\u002Fdiv>\n            <div style=\"font-family:var(--mono);font-size:13px;color:var(--ink);margin-top:4px\">npx github:…/claude-code-tool-kit <span style=\"color:var(--accent)\">--all<\u002Fspan><\u002Fdiv>\n            <div style=\"height:14px\"><\u002Fdiv>\n            <div style=\"font-family:var(--mono);font-size:12px;color:var(--ink-3)\">just the files, no third-party<\u002Fdiv>\n            <div style=\"font-family:var(--mono);font-size:13px;color:var(--ink);margin-top:4px\">npx … <span style=\"color:var(--accent)\">--archetype files-only<\u002Fspan><\u002Fdiv>\n            <div style=\"height:14px\"><\u002Fdiv>\n            <div style=\"font-family:var(--mono);font-size:12px;color:var(--ink-3)\">clone + run (own the toolkit)<\u002Fdiv>\n            <div style=\"font-family:var(--mono);font-size:13px;color:var(--ink);margin-top:4px\">git clone <span style=\"color:var(--accent)\">…/claude-code-tool-kit.git<\u002Fspan> ~/cct<br>node ~/cct/install.mjs<\u002Fdiv>\n            <div style=\"height:14px\"><\u002Fdiv>\n            <div style=\"font-family:var(--mono);font-size:12px;color:var(--ink-3)\">git submodule (teams)<\u002Fdiv>\n            <div style=\"font-family:var(--mono);font-size:13px;color:var(--ink);margin-top:4px\">git submodule add <span style=\"color:var(--accent)\">…<\u002Fspan> claude-code-toolkit<br>node claude-code-toolkit/install.mjs<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"cat\">\n          <div class=\"cat-head\">\n            <div><h4>What the installer does<\u002Fh4><div class=\"meta\">8 steps · idempotent<\u002Fdiv><\u002Fdiv>\n            <span class=\"badge badge-green\">flow<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"cat-body\">\n            <div class=\"cat-row\"><span class=\"cmd\">1.<\u002Fspan><span class=\"desc\" style=\"text-align:left;max-width:none;color:var(--ink-2)\">detects Node, git, npx, Claude Code, uvx<\u002Fspan><\u002Fdiv>\n            <div class=\"cat-row\"><span class=\"cmd\">2.<\u002Fspan><span class=\"desc\" style=\"text-align:left;max-width:none;color:var(--ink-2)\">asks for archetype with friendly examples<\u002Fspan><\u002Fdiv>\n            <div class=\"cat-row\"><span class=\"cmd\">3.<\u002Fspan><span class=\"desc\" style=\"text-align:left;max-width:none;color:var(--ink-2)\">copies skills · agents · rules · hooks · settings<\u002Fspan><\u002Fdiv>\n            <div class=\"cat-row\"><span class=\"cmd\">4.<\u002Fspan><span class=\"desc\" style=\"text-align:left;max-width:none;color:var(--ink-2)\">adds marketplaces · installs Claude Code plugins<\u002Fspan><\u002Fdiv>\n            <div class=\"cat-row\"><span class=\"cmd\">5.<\u002Fspan><span class=\"desc\" style=\"text-align:left;max-width:none;color:var(--ink-2)\">clones agent collections into gitignored paths<\u002Fspan><\u002Fdiv>\n            <div class=\"cat-row\"><span class=\"cmd\">6.<\u002Fspan><span class=\"desc\" style=\"text-align:left;max-width:none;color:var(--ink-2)\">prompts for API keys you have, skip the rest<\u002Fspan><\u002Fdiv>\n            <div class=\"cat-row\"><span class=\"cmd\">7.<\u002Fspan><span class=\"desc\" style=\"text-align:left;max-width:none;color:var(--ink-2)\">initializes .claude/memory/ for cross-session<\u002Fspan><\u002Fdiv>\n            <div class=\"cat-row\"><span class=\"cmd\">8.<\u002Fspan><span class=\"desc\" style=\"text-align:left;max-width:none;color:var(--ink-2)\">generates docs/LICENSES.md from what was installed<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ═════ FOOT CTA ═════ -->\n<section style=\"padding:80px 0;border-top:1px solid var(--line);background:linear-gradient(180deg, transparent, rgba(217,119,87,0.03))\">\n  <div class=\"wrap\" style=\"text-align:center\">\n    <span class=\"eyebrow\" style=\"justify-content:center\">Ready when you are<\u002Fspan>\n    <h2 style=\"margin:18px 0 0;font-size:clamp(36px,5vw,64px);letter-spacing:-0.03em;line-height:1.05;font-weight:600;text-wrap:balance\">\n      Stop starting <span style=\"font-family:var(--serif);font-style:italic;color:var(--accent);font-weight:400\">from zero<\u002Fspan><br>\n      every session.\n    <\u002Fh2>\n    <p style=\"margin:18px auto 0;color:var(--ink-2);font-size:18px;line-height:1.55;max-width:560px;text-wrap:pretty\">\n      MIT-licensed, free forever, stack-agnostic. Your project keeps the toolkit; the toolkit keeps your conventions.\n    <\u002Fp>\n    <div style=\"margin-top:28px;display:inline-flex;gap:10px;flex-wrap:wrap;justify-content:center\">\n      <a class=\"btn btn-primary\" href=\"https://github.com/viknesh20-20/caude-code-tool-kit\" onclick=\"this.href='https://github.com/viknesh20-20/claude-code-tool-kit'\" target=\"_blank\" rel=\"noopener\">\n        <svg viewBox=\"0 0 24 24\" fill=\"currentColor\" style=\"width:14px;height:14px\"><path d=\"M12 .5C5.65.5.5 5.65.5 12c0 5.08 3.29 9.39 7.86 10.91.58.11.79-.25.79-.56v-2c-3.2.7-3.87-1.36-3.87-1.36-.52-1.32-1.27-1.67-1.27-1.67-1.04-.71.08-.7.08-.7 1.15.08 1.76 1.18 1.76 1.18 1.02 1.76 2.69 1.25 3.34.96.1-.74.4-1.25.72-1.54-2.55-.29-5.24-1.28-5.24-5.69 0-1.26.45-2.29 1.18-3.1-.12-.29-.51-1.46.11-3.04 0 0 .96-.31 3.15 1.18a10.95 10.95 0 0 1 5.74 0c2.19-1.49 3.15-1.18 3.15-1.18.62 1.58.23 2.75.11 3.04.74.81 1.18 1.84 1.18 3.1 0 4.42-2.7 5.39-5.27 5.68.41.36.78 1.06.78 2.13v3.16c0 .31.21.68.8.56C20.21 21.39 23.5 17.08 23.5 12 23.5 5.65 18.35.5 12 .5z\"><\u002Fpath><\u002Fsvg>\n        Star on GitHub\n      <\u002Fa>\n      <a class=\"btn btn-ghost\" href=\"https://github.com/viknesh20-20/claude-code-tool-kit/blob/master/CHEATSHEET.md\" target=\"_blank\" rel=\"noopener\">\n        Read the cheatsheet\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" style=\"width:14px;height:14px\"><line x1=\"5\" y1=\"12\" x2=\"19\" y2=\"12\"><\u002Fline><polyline points=\"12 5 19 12 12 19\"><\u002Fpolyline><\u002Fsvg>\n      <\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ═════ FOOTER ═════ -->\n<footer class=\"foot\">\n  <div class=\"wrap\">\n    <div class=\"foot-grid\">\n      <div>\n        <div class=\"brand\" style=\"font-size:14px\"><span class=\"brand-dot\"><\u002Fspan><span class=\"brand-name\">claude-code-toolkit<\u002Fspan><\u002Fdiv>\n        <p style=\"margin-top:18px\">Production-ready Claude Code configuration. Original work — 14 agents, 30+ skills, 14 rules, 3 hooks — plus a curated installer for the best of the open-source ecosystem.<\u002Fp>\n        <p style=\"font-family:var(--mono);font-size:11px;color:var(--ink-3)\">MIT License · third-party content fetched on demand into gitignored paths · per-source attribution in <code>docs/LICENSES.md<\u002Fcode><\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <h6>Toolkit<\u002Fh6>\n        <ul>\n          <li><a href=\"#archetypes\">Archetypes<\u002Fa><\u002Fli>\n          <li><a href=\"#skills\">Skills<\u002Fa><\u002Fli>\n          <li><a href=\"#agents\">Agents<\u002Fa><\u002Fli>\n          <li><a href=\"#mcp\">MCP servers<\u002Fa><\u002Fli>\n          <li><a href=\"#rules\">Rules &amp; hooks<\u002Fa><\u002Fli>\n          <li><a href=\"#install\">Install<\u002Fa><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div>\n        <h6>Docs<\u002Fh6>\n        <ul>\n          <li><a href=\"https://github.com/viknesh20-20/claude-code-tool-kit#readme\" target=\"_blank\" rel=\"noopener\">README<\u002Fa><\u002Fli>\n          <li><a href=\"https://github.com/viknesh20-20/claude-code-tool-kit/blob/master/CHEATSHEET.md\" target=\"_blank\" rel=\"noopener\">Cheatsheet<\u002Fa><\u002Fli>\n          <li><a href=\"https://github.com/viknesh20-20/claude-code-tool-kit/blob/master/CATALOG.md\" target=\"_blank\" rel=\"noopener\">Catalog<\u002Fa><\u002Fli>\n          <li><a href=\"https://github.com/viknesh20-20/claude-code-tool-kit/tree/master/docs\" target=\"_blank\" rel=\"noopener\">docs/<\u002Fa><\u002Fli>\n          <li><a href=\"https://github.com/viknesh20-20/claude-code-tool-kit/blob/master/CONTRIBUTING.md\" target=\"_blank\" rel=\"noopener\">Contributing<\u002Fa><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div>\n        <h6>Project<\u002Fh6>\n        <ul>\n          <li><a href=\"https://github.com/viknesh20-20/claude-code-tool-kit\" target=\"_blank\" rel=\"noopener\">GitHub<\u002Fa><\u002Fli>\n          <li><a href=\"https://github.com/viknesh20-20/claude-code-tool-kit/issues\" target=\"_blank\" rel=\"noopener\">Issues<\u002Fa><\u002Fli>\n          <li><a href=\"https://github.com/viknesh20-20/claude-code-tool-kit/blob/master/LICENSE\" target=\"_blank\" rel=\"noopener\">MIT License<\u002Fa><\u002Fli>\n          <li><a href=\"https://github.com/viknesh20-20/claude-code-tool-kit/blob/master/CODE_OF_CONDUCT.md\" target=\"_blank\" rel=\"noopener\">Code of Conduct<\u002Fa><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"foot-bottom\">\n      <span>© 2026 · viknesh20-20 · MIT<\u002Fspan>\n      <span>built for Claude Code · v1.0.0<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<script>\n  // Tab switcher\n  document.querySelectorAll('.arch-tab').forEach(tab=>{\n    tab.addEventListener('click', ()=>{\n      const target = tab.dataset.tab;\n      document.querySelectorAll('.arch-tab').forEach(t=>t.classList.remove('active'));\n      document.querySelectorAll('.arch-panel').forEach(p=>p.classList.remove('active'));\n      tab.classList.add('active');\n      document.querySelector(`.arch-panel[data-panel=\"${target}\"]`).classList.add('active');\n    });\n  });\n\n  // Copy button\n  const btn = document.getElementById('copy');\n  const lbl = document.getElementById('copy-label');\n  btn.addEventListener('click', async ()=>{\n    try{\n      await navigator.clipboard.writeText('npx github:viknesh20-20/claude-code-tool-kit');\n      btn.classList.add('ok');\n      lbl.textContent = 'copied ✓';\n      setTimeout(()=>{btn.classList.remove('ok');lbl.textContent='copy'},1600);\n    }catch(e){\n      lbl.textContent='select & copy';\n    }\n  });\n\n  // Light parallax on stack layers\n  const stack = document.querySelector('.stack');\n  if (stack){\n    stack.addEventListener('mousemove', (e)=>{\n      const r = stack.getBoundingClientRect();\n      const x = (e.clientX - r.left) / r.width - 0.5;\n      const y = (e.clientY - r.top) / r.height - 0.5;\n      document.querySelectorAll('.layer').forEach((l, i)=>{\n        const depth = (i+1) * 2;\n        l.style.transform = `translateX(calc(-50% + ${x*depth}px)) translateY(${y*depth}px)`;\n      });\n    });\n    stack.addEventListener('mouseleave', ()=>{\n      document.querySelectorAll('.layer').forEach(l=>{ l.style.transform='translateX(-50%)' });\n    });\n  }\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
